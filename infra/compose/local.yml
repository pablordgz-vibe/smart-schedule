x-runtime-env: &runtime-env
  NODE_ENV: development
  HOST: 0.0.0.0
  DATABASE_URL: postgres://user:password@postgres:5432/smart_schedule
  REDIS_URL: redis://redis:6379
  OBJECT_STORAGE_ENDPOINT: http://minio:9000
  OBJECT_STORAGE_ACCESS_KEY: minioadmin
  OBJECT_STORAGE_SECRET_KEY: minioadmin
  OBJECT_STORAGE_BUCKET: smart-schedule
  OBJECT_STORAGE_USE_SSL: false
  JWT_SECRET: super-secret-placeholder-at-least-32-chars-long-0123456789
  SESSION_SECRET: another-super-secret-placeholder-at-least-32-chars-long
  MAIL_FROM_ADDRESS: no-reply@smart-schedule.local

services:
  reverse-proxy:
    image: caddy:2.10-alpine
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: smart_schedule
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d smart_schedule"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    environment:
      <<: *runtime-env
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/worker.Dockerfile
    environment:
      <<: *runtime-env
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  scheduler:
    build:
      context: ../..
      dockerfile: infra/docker/scheduler.Dockerfile
    environment:
      <<: *runtime-env
      PORT: 3002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ../..
      dockerfile: infra/docker/frontend.Dockerfile
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
