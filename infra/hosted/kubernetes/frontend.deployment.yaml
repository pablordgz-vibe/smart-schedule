apiVersion: apps/v1
kind: Deployment
metadata:
  name: smart-schedule-frontend
  namespace: smart-schedule
spec:
  replicas: 2
  selector:
    matchLabels:
      app: smart-schedule-frontend
  template:
    metadata:
      labels:
        app: smart-schedule-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/example/smart-schedule-frontend:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: smart-schedule-frontend
  namespace: smart-schedule
spec:
  selector:
    app: smart-schedule-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
