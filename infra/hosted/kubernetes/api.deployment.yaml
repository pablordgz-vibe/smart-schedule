apiVersion: apps/v1
kind: Deployment
metadata:
  name: smart-schedule-api
  namespace: smart-schedule
spec:
  replicas: 2
  selector:
    matchLabels:
      app: smart-schedule-api
  template:
    metadata:
      labels:
        app: smart-schedule-api
    spec:
      containers:
        - name: api
          image: ghcr.io/example/smart-schedule-api:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: smart-schedule-runtime
---
apiVersion: v1
kind: Service
metadata:
  name: smart-schedule-api
  namespace: smart-schedule
spec:
  selector:
    app: smart-schedule-api
  ports:
    - name: http
      port: 3000
      targetPort: 3000
