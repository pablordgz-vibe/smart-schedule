name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Workflow Self-Test
        run: pnpm run workflow:self-test

      - name: Format Check
        run: pnpm run format:check

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Boundary Check
        run: pnpm run boundary:check

      - name: Design System Check
        run: pnpm run design-system:check

      - name: Unit Tests
        run: pnpm run test

      - name: Repo Coverage Gate
        run: pnpm run coverage:repo

      - name: Critical Coverage Gate
        run: pnpm run coverage:critical

  smoke-gate:
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: API Smoke Tests
        run: pnpm --filter=@smart-schedule/api run test:e2e

      - name: Worker Smoke Tests
        run: pnpm --filter=@smart-schedule/worker run test:e2e

      - name: Scheduler Smoke Tests
        run: pnpm --filter=@smart-schedule/scheduler run test:e2e

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps

      - name: Frontend Smoke Tests
        run: pnpm --filter=@smart-schedule/frontend run test:e2e
