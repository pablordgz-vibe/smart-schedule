name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Format Check
        run: pnpm run format:check

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Run Tests
        run: pnpm run test

      - name: Run Runtime Smoke Tests
        run: |
          pnpm --filter=@smart-schedule/api run test:e2e
          pnpm --filter=@smart-schedule/worker run test:e2e
          pnpm --filter=@smart-schedule/scheduler run test:e2e

      - name: Migration Check
        run: pnpm run migration:check

      - name: Validate Compose Topology
        run: docker compose -f infra/compose/local.yml config

      - name: Build Runtime Images
        run: |
          docker build -f infra/docker/api.Dockerfile -t smart-schedule/api:${GITHUB_REF_NAME} .
          docker build -f infra/docker/worker.Dockerfile -t smart-schedule/worker:${GITHUB_REF_NAME} .
          docker build -f infra/docker/scheduler.Dockerfile -t smart-schedule/scheduler:${GITHUB_REF_NAME} .
          docker build -f infra/docker/frontend.Dockerfile -t smart-schedule/frontend:${GITHUB_REF_NAME} .
