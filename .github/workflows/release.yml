name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Run Tests
        run: pnpm run test

      - name: Migration Check
        run: |
          echo "Validating migrations..."
          # Placeholder for migration validation scripts
          # Example: pnpm run migrations:check

      - name: Build and Push Docker Images
        run: |
          echo "Building and pushing versioned images..."
          # Example: turbo run build:image
